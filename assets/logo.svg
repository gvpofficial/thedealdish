<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50" class="logo-svg">
    <defs>
        <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#12422c" />
            <stop offset="100%" stop-color="#3ab36c" />
        </linearGradient>
        <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#81c784" />
            <stop offset="100%" stop-color="#2e7d32" />
        </linearGradient>
    </defs>
    <!-- Icon Container -->
    <g transform="translate(5, 5)">
        <!-- Plate Base -->
        <path d="M 2 32 Q 20 40 38 32" fill="none" stroke="#2c704c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
        <!-- Food Cover / Cloche (Slightly Lifted) -->
        <path d="M 8 24 A 12 12 0 0 1 32 24 Z" fill="url(#iconGrad)"/>
        <!-- Cloche Handle -->
        <circle cx="20" cy="11" r="2.5" fill="#12422c"/>
        <!-- Sprouting Leaf (Green / Sustainable) -->
        <path d="M 23 20 C 27 15 35 15 37 10 C 33 13 28 17 25 22 Z" fill="url(#leafGrad)"/>
        <path d="M 25 22 C 28 19 32 18 35 14" fill="none" stroke="#12422c" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Typography (Text) -->
    <text x="55" y="34" fill="#12422c" font-family="'Outfit', sans-serif" font-weight="400" font-size="20" letter-spacing="0.05em">THE</text>
    <text x="96" y="34" fill="#3ab36c" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" letter-spacing="0.05em">DEALDISH</text>
</svg>
